<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message For Rahul</title>
    <!-- Google Fonts for Premium Typography -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400;1,600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f0f5;
            --text-secondary: #a0a5b5;
            --accent-gold: #d4af37;
            --glow-color: rgba(212, 175, 55, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }

        /* Subtle Luxury Background Animations */
        body::before {
            content: '';
            position: absolute;
            width: 150vw;
            height: 150vh;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
            top: -25%;
            left: -25%;
            z-index: 0;
            animation: drift 20s infinite alternate ease-in-out;
            pointer-events: none;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 10%) scale(1.1); }
        }

        /* Container Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            padding: 40px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px; /* Perfect desktop and mobile standard */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            z-index: 1;
            position: relative;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeInCard 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInCard {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Decorative Header Design */
        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .premium-emblem {
            font-size: 1.5rem;
            color: var(--accent-gold);
            margin-bottom: 12px;
            opacity: 0.8;
            letter-spacing: 3px;
        }

        .line-divider {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
            margin: 0 auto;
        }

        /* Animated Text Styling */
        .text-container {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.45rem;
            line-height: 1.7;
            color: var(--text-primary);
            text-align: center;
            min-height: 180px; /* Prevents layout shifting during typing */
            letter-spacing: 0.3px;
        }

        /* Typing Effects */
        .word {
            display: inline-block;
            opacity: 0;
            transform: translateY(4px);
            filter: blur(3px);
            animation: wordAppear 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            margin-right: 6px;
        }

        @keyframes wordAppear {
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        /* Decorative Footer */
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* Smooth Mobile Optimization overrides */
        @media (max-width: 480px) {
            .card {
                padding: 35px 24px;
                border-radius: 20px;
            }
            .text-container {
                font-size: 1.3rem;
                min-height: 220px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="premium-emblem">✧</div>
            <div class="line-divider"></div>
        </div>

        <div class="text-container" id="typing-container">
            <!-- Dynamic words inject here -->
        </div>

        <div class="footer">
            Shared with Care
        </div>
    </div>

    <script>
        const message = "Hey Rahul, this is the best way for me to share my feelings. I cherished the golden time we spent together, and you still appear in my dreams. I am truly impressed by you, and I wish we could always stay connected.";
        
        // Split text into individual words
        const words = message.split(" ");
        const container = document.getElementById("typing-container");
        
        // Typing speed controls (in milliseconds)
        const delayBetweenWords = 180; 
        const initialDelay = 800; 

        function startTyping() {
            words.forEach((word, index) => {
                const wordSpan = document.createElement("span");
                wordSpan.classList.add("word");
                wordSpan.textContent = word;
                
                // Staggered execution for luxurious typography presentation
                wordSpan.style.animationDelay = `${initialDelay + (index * delayBetweenWords)}ms`;
                
                container.appendChild(wordSpan);
            });
        }

        // Trigger animation once DOM content loads
        window.addEventListener("DOMContentLoaded", startTyping);
    </script>
</body>
</html>
