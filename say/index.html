<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Brother, Rahul</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow: hidden; /* Prevents scrollbars from the canvas */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Interactive Background */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* The glowing message card */
        .glass-card {
            position: relative;
            z-index: 2;
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px;
            max-width: 650px;
            width: 90%;
            box-shadow: 0 0 40px rgba(0, 153, 255, 0.2), inset 0 0 20px rgba(255, 255, 255, 0.05);
            animation: cardEntrance 2s ease-out forwards;
            opacity: 0;
            transform: scale(0.9);
        }

        @keyframes cardEntrance {
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            font-weight: 700;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
            opacity: 0;
            animation: fadeIn 1s 1s ease-out forwards;
        }

        .message-container {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #e0e0e0;
            min-height: 150px; /* Keeps the card size stable while typing */
        }

        /* Cursor for the typewriter effect */
        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2rem;
            background-color: #00f2fe;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .signature-block {
            margin-top: 40px;
            opacity: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
        }

        .sign-off {
            font-size: 1.1rem;
            color: #a0a0a0;
            margin-bottom: 8px;
        }

        .name {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        @keyframes fadeIn {
            100% { opacity: 1; }
        }

        @media (max-width: 600px) {
            .glass-card {
                padding: 30px;
            }
            h1 { font-size: 2rem; }
            .message-container { font-size: 1.1rem; }
        }
    </style>
</head>
