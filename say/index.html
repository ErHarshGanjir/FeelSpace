<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Rahul</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .letter-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            
            /* Animation properties */
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1.2s ease-out forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 24px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.15rem;
            line-height: 1.7;
            margin-bottom: 20px;
            color: #f0f0f0;
        }

        .signature-block {
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 20px;
        }

        .sign-off {
            font-size: 1.15rem;
            margin-bottom: 5px;
        }

        .name {
            font-size: 1.4rem;
            font-weight: bold;
            font-style: italic;
            background: -webkit-linear-gradient(#fff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Mobile responsiveness */
        @media (max-width: 480px) {
            .letter-container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.75rem;
            }
            p {
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

    <div class="letter-container">
        <h1>Hey Rahul,</h1>
        
        <p>I miss you, bro. Things are different when you're not around, and I really need my brother by my side.</p>
        
        <p>You are the kind of friend I can always count on, and I'm lucky to have you in my life. Let's meet up soon.</p>
        
        <div class="signature-block">
            <p class="sign-off">Love you, man,</p>
            <p class="name">Harsh Ganjir</p>
        </div>
    </div>

</body>
</html>
