<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Rahul</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Space Grotesk', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .glass-card {
            position: relative;
            z-index: 2;
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 90%;
            width: 600px;
            box-shadow: 0 0 40px rgba(0, 153, 255, 0.2);
            animation: cardEntrance 1.5s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes cardEntrance {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            animation: fadeIn 1s 0.5s forwards;
        }

        .message-container {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #e0e0e0;
            min-height: 120px;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.2rem;
            background-color: #00f2fe;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .signature-block {
            margin-top: 30px;
            opacity: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="glass-card">
        <h1>Hey Rahul,</h1>
        <div class="message-container">
            <span id="typed-text"></span><span class="cursor"></span>
        </div>
        <div class="signature-block" id="signature">
            <div style="color: #a0a0a0; margin-bottom: 5px;">Love you, man,</div>
            <div class="name">Harsh Ganjir</div>
        </div>
    </div>

    <script>
        // TYPEWRITER SCRIPT
        const textToType = "I miss you, bro. Things are different when you're not around, and I really need my brother by my side.<br><br>You are the kind of friend I can always count on, and I'm lucky to have you in my life. Let's meet up soon.";
        const textElement = document.getElementById('typed-text');
        const signature = document.getElementById('signature');
        
        // We use innerHTML for the line breaks
        let i = 0;
        let isTag = false;
        let text = "";

        function typeWriter() {
            if (i < textToType.length) {
                text = textToType.slice(0, i + 1);
                textElement.innerHTML = text;
                i++;
                setTimeout(typeWriter, 40); // typing speed
            } else {
                setTimeout(() => {
                    signature.style.animation = "fadeIn 1s forwards";
                }, 500);
            }
        }
        
        setTimeout(typeWriter, 1200);

        // PARTICLES SCRIPT
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particlesArray = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(79, 172, 254, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particlesArray = [];
            for (let i = 0; i < 100; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });
    </script>
</body>
</html>
