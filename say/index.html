<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Rahul</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Space Grotesk', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Interactive Background */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* The glowing message card */
        .glass-card {
            position: relative;
            z-index: 2;
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px;
            max-width: 650px;
            width: 90%;
            box-shadow: 0 0 40px rgba(0, 153, 255, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.05);
            animation: cardEntrance 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            opacity: 0;
            transform: scale(0.95) translateY(20px);
        }

        @keyframes cardEntrance {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* MODERN TEXT ANIMATION: Blur Reveal */
        @keyframes blurReveal {
            0% {
                opacity: 0;
                filter: blur(12px);
                transform: translateY(15px);
            }
            100% {
                opacity: 1;
                filter: blur(0);
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            font-weight: 700;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(79, 172, 254, 0.2);
            
            /* Apply animation */
            opacity: 0;
            animation: blurReveal 1.2s forwards;
            animation-delay: 0.8s; /* Starts right after card enters */
        }

        .message-paragraph {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #e0e0e0;
            margin-bottom: 20px;
            
            /* Apply animation */
            opacity: 0;
            animation: blurReveal 1.2s forwards;
        }

        /* Stagger the delays for each paragraph */
        .delay-1 { animation-delay: 1.5s; }
        .delay-2 { animation-delay: 2.2s; }

        .signature-block {
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
            
            /* Apply animation */
            opacity: 0;
            animation: blurReveal 1.2s forwards;
            animation-delay: 3.2s; /* Appears last */
        }

        .sign-off {
            font-size: 1.1rem;
            color: #a0a0a0;
            margin-bottom: 8px;
        }

        .name {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 600px) {
            .glass-card { padding: 30px; }
            h1 { font-size: 2rem; }
            .message-paragraph { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="glass-card">
        <h1>Hey Rahul,</h1>
        
        <p class="message-paragraph delay-1">
            I miss you, bro. Things are different when you're not around, and I really need my brother by my side.
        </p>
        
        <p class="message-paragraph delay-2">
            You are the kind of friend I can always count on, and I'm lucky to have you in my life. Let's meet up soon.
        </p>
        
        <div class="signature-block">
            <div class="sign-off">Love you, man,</div>
            <div class="name">Harsh Ganjir</div>
        </div>
    </div>

    <script>
        // --- INTERACTIVE PARTICLE BACKGROUND LOGIC ---
        // (Keeping this the same since it works great!)
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(79, 172, 254, 0.4)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particlesArray = [];
            for (let i = 0; i < 100; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });
    </script>
</body>
</html>
