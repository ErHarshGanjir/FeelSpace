<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahul's Repo Rush</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 10px;
            color: #58a6ff;
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
        }
        p {
            margin-bottom: 15px;
            font-size: 14px;
            color: #8b949e;
        }
        #gameContainer {
            position: relative;
            border: 3px solid #30363d;
            border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas {
            background: #161b22;
            display: block;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 17, 23, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
        }
        .btn {
            background-color: #238636;
            color: white;
            border: 1px solid rgba(240,246,252,0.1);
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 15px;
        }
        .btn:hover {
            background-color: #2ea44f;
        }
        .win-message {
            color: #ff7b72;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>Rahul's Repo Rush 🚀</h1>
    <p>Use <b>Left / Right Arrow keys</b> or <b>A / D</b> to move. Collect Repos, avoid Bugs!</p>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="600" height="450"></canvas>
        <div id="overlay">
            <h2 id="overlayTitle" style="font-size: 24px; margin-bottom: 10px;">Ready, Rahul?</h2>
            <p id="overlaySub" style="color: #8b949e; text-align: center; padding: 0 20px;">Reach 50 Points to win!</p>
            <button class="btn" id="startBtn" onclick="startGame()">Start Game</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlaySub = document.getElementById('overlaySub');
        const startBtn = document.getElementById('startBtn');

        // Game Configuration
        let isPlaying = false;
        let score = 0;
        let level = 1;
        let timeElapsed = 0;
        let targetScore = 50;

        // Player (Rahul) object
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 50,
            width: 50,
            height: 40,
            speed: 8,
            color: '#58a6ff'
        };

        // Items arrays
        let items = [];
        let lastSpawnTime = 0;
        let baseSpawnInterval = 1000; // ms

        // Keyboard Input State
        const keys = {
            left: false,
            right: false
        };

        // Event Listeners
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.right = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.right = false;
        });

        function startGame() {
            // Reset states
            score = 0;
            level = 1;
            timeElapsed = 0;
            items = [];
            player.x = canvas.width / 2 - player.width / 2;
            isPlaying = true;
            lastSpawnTime = performance.now();
            
            overlay.style.display = 'none';
            
            requestAnimationFrame(gameLoop);
        }

        function createItem() {
            // Randomly choose between a valid Repo (Good) or a Bug (Bad)
            const isRepo = Math.random() > 0.4; 
            const size = isRepo ? 24 : 18;
            
            items.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                size: size,
                type: isRepo ? 'repo' : 'bug',
                // Speed increases based on the current level
                speed: (Math.random() * 2 + 2) + (level * 0.8), 
                color: isRepo ? '#3fb950' : '#f85149'
            });
        }

        function gameOver(status) {
            isPlaying = false;
            overlay.style.display = 'flex';
            
            if (status === 'win') {
                overlayTitle.innerHTML = "<div class='win-message'>You won Harsh's heart! ❤️</div>";
                overlaySub.innerText = `Outstanding job, Rahul! You mastered Level ${level}!`;
                startBtn.innerText = "Play Again";
            } else {
                overlayTitle.innerHTML = "<span style='color: #ff7b72;'>Game Over! 🐛</span>";
                overlaySub.innerText = `Rahul caught too many bugs. Final Score: ${score} (Level ${level})`;
                startBtn.innerText = "Try Again";
            }
        }

        // Main Loop
        let lastTime = 0;
        function gameLoop(timestamp) {
            if (!isPlaying) return;

            // Clear Screen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Handle Difficulty & Level increases over time
            timeElapsed += 1;
            if (timeElapsed % 400 === 0) {
                level++;
            }

            // Move Player
            if (keys.left && player.x > 0) player.x -= player.speed;
            if (keys.right && player.x < canvas.width - player.width) player.x += player.speed;

            // Draw Rahul (Player avatar designed like a terminal/code block)
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px monospace';
            ctx.fillText("Rahul", player.x + 6, player.y + 24);

            // Spawning items dynamically
            let currentInterval = Math.max(400, baseSpawnInterval - (level * 80));
            if (timestamp - lastSpawnTime > currentInterval) {
                createItem();
                lastSpawnTime = timestamp;
            }

            // Update & Draw Items
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.y += item.speed;

                // Draw item shapes
                ctx.fillStyle = item.color;
                if (item.type === 'repo') {
                    // Draw Repo box
                    ctx.fillRect(item.x, item.y, item.size, item.size);
                    ctx.fillStyle = '#fff';
                    ctx.font = '10px sans-serif';
                    ctx.fillText("📦", item.x + 3, item.y + 14);
                } else {
                    // Draw Bug circle
                    ctx.beginPath();
                    ctx.arc(item.x + item.size/2, item.y + item.size/2, item.size/2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = '10px sans-serif';
                    ctx.fillText("🪲", item.x + 2, item.y + 13);
                }

                // Check Collisions with Rahul
                if (item.x < player.x + player.width &&
                    item.x + item.size > player.x &&
                    item.y < player.y + player.height &&
                    item.y + item.size > player.y) {
                    
                    if (item.type === 'repo') {
                        score += 2;
                        // Win Condition Checking
                        if (score >= targetScore) {
                            gameOver('win');
                            return;
                        }
                    } else {
                        gameOver('lose');
                        return;
                    }
                    items.splice(i, 1);
                    continue;
                }

                // Remove out of bounds items
                if (item.y > canvas.height) {
                    items.splice(i, 1);
                }
            }

            // Draw Top UI Panel
            ctx.fillStyle = '#21262d';
            ctx.fillRect(0, 0, canvas.width, 40);
            
            ctx.fillStyle = '#c9d1d9';
            ctx.font = '14px monospace';
            ctx.fillText(`Player: Rahul`, 15, 25);
            ctx.fillText(`Score: ${score}/${targetScore}`, 200, 25);
            
            ctx.fillStyle = '#f0883e';
            ctx.fillText(`Level: ${level} (Harder!)`, canvas.width - 150, 25);

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
