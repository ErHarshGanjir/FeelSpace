<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo Pulse // Rahul</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-color: #121217;
            --accent-blue: #00f0ff;
            --accent-green: #39ff14;
            --accent-red: #ff3131;
            --text-main: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            background: var(--panel-color);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #22222a;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            width: 600px;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #888896;
        }

        .title span {
            color: var(--accent-blue);
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            font-family: monospace;
            font-size: 14px;
        }

        .stat-box {
            background: #1a1a24;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #2a2a38;
        }

        #scoreVal { color: var(--accent-green); font-weight: bold; }
        #levelVal { color: var(--accent-blue); font-weight: bold; }

        #canvasContainer {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: #020204;
        }

        canvas {
            display: block;
        }

        /* Modern overlay UI */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 8, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .overlay h2 {
            font-size: 28px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .overlay p {
            color: #6c6c7d;
            font-size: 14px;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.5;
        }

        .btn {
            background: transparent;
            color: var(--text-main);
            border: 2px solid var(--accent-blue);
            padding: 12px 30px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        /* Win State Heart Animation */
        .heart-container {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .win-title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(45deg, #ff3131, #ff7b72);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .heart {
            font-size: 60px;
            color: var(--accent-red);
            animation: beat 0.8s infinite alternate;
            margin: 15px 0;
        }

        @keyframes beat {
            to { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">REPO//<span>PULSE</span></div>
        <div class="stats-bar">
            <div class="stat-box">PLAYER: <span style="color: #fff;">RAHUL</span></div>
            <div class="stat-box">SCORE: <span id="scoreVal">0/50</span></div>
            <div class="stat-box">LVL: <span id="levelVal">1</span></div>
        </div>
    </div>

    <div class="game-wrapper">
        <div id="canvasContainer">
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            
            <div id="uiOverlay" class="overlay">
                <div id="menuContent">
                    <h2>Ready, Rahul?</h2>
                    <p>Move mouse or drag screen left/right to move.<br>Absorb green source blocks. Avoid red corruption.</p>
                    <button class="btn" onclick="initGame()">INITIALIZE</button>
                </div>
                
                <div id="winContent" class="heart-container">
                    <div class="win-title">YOU WON HARSH'S HEART</div>
                    <div class="heart">❤️</div>
                    <p style="margin-bottom: 15px;">Perfect execution. Repository secured successfully.</p>
                    <button class="btn" onclick="initGame()">PLAY AGAIN</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const uiOverlay = document.getElementById('uiOverlay');
        const menuContent = document.getElementById('menuContent');
        const winContent = document.getElementById('winContent');
        
        const scoreVal = document.getElementById('scoreVal');
        const levelVal = document.getElementById('levelVal');

        let gameActive = false;
        let score = 0;
        let level = 1;
        let speedMultiplier = 1;
        
        let playerX = 300;
        const playerY = 340;
        const playerSize = 16;
        let targetX = 300; // Smooth movement interpolation

        let entities = [];
        let particles = [];
        let spawnTimer = 0;

        // Mouse & Touch Interaction
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            targetX = e.clientX - rect.left;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            if(e.touches[0]) {
                targetX = e.touches[0].clientX - rect.left;
            }
        }, { passive: false });

        function initGame() {
            score = 0;
            level = 1;
            speedMultiplier = 1;
            entities = [];
            particles = [];
            spawnTimer = 0;
            playerX = 300;
            targetX = 300;
            
            scoreVal.innerText = "0/50";
            levelVal.innerText = "1";
            
            uiOverlay.style.opacity = '0';
            setTimeout(() => uiOverlay.style.display = 'none', 300);
            
            gameActive = true;
            requestAnimationFrame(update);
        }

        function triggerWin() {
            gameActive = false;
            uiOverlay.style.display = 'flex';
            setTimeout(() => uiOverlay.style.opacity = '1', 10);
            menuContent.style.display = 'none';
            winContent.style.display = 'flex';
        }

        function triggerGameOver() {
            gameActive = false;
            uiOverlay.style.display = 'flex';
            setTimeout(() => uiOverlay.style.opacity = '1', 10);
            menuContent.style.display = 'block';
            winContent.style.display = 'none';
            document.querySelector('#menuContent h2').innerText = "System Corrupted";
            document.querySelector('#menuContent p').innerHTML = `Rahul hit a bug. Final Score: ${score}<br>Try again to win Harsh's heart!`;
            document.querySelector('#menuContent .btn').innerText = "REBOOT SYSTEM";
        }

        function spawnParticle(x, y, color) {
            for(let i=0; i<12; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    radius: Math.random() * 3 + 1,
                    alpha: 1,
                    color: color
                });
            }
        }

        function update(timestamp) {
            if (!gameActive) return;

            // Clear frame
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Minimalist Tech Grid Lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for(let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }

            // Smoothly ease player position toward target/mouse position
            playerX += (targetX - playerX) * 0.25;
            // Bound checks
            if (playerX < playerSize) playerX = playerSize;
            if (playerX > canvas.width - playerSize) playerX = canvas.width - playerSize;

            // Draw Level/Speed Escalation logic
            spawnTimer++;
            if (spawnTimer % 300 === 0) {
                level++;
                speedMultiplier += 0.25;
                levelVal.innerText = level;
            }

            // Generate Dropping Codes/Entities
            if (Math.random() < 0.03 + (level * 0.005)) {
                const isGood = Math.random() > 0.45;
                entities.push({
                    x: Math.random() * (canvas.width - 20) + 10,
                    y: -10,
                    speed: (Math.random() * 2 + 3) * speedMultiplier,
                    type: isGood ? 'repo' : 'bug',
                    size: isGood ? 8 : 6,
                    color: isGood ? '#39ff14' : '#ff3131'
                });
            }

            // Draw & Calculate Entity Logic
            for (let i = entities.length - 1; i >= 0; i--) {
                let e = entities[i];
                e.y += e.speed;

                // Draw diamond shape for repositories, clean square for bugs
                ctx.fillStyle = e.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = e.color;
                
                ctx.beginPath();
                if (e.type === 'repo') {
                    ctx.moveTo(e.x, e.y - e.size);
                    ctx.lineTo(e.x + e.size, e.y);
                    ctx.lineTo(e.x, e.y + e.size);
                    ctx.lineTo(e.x - e.size, e.y);
                } else {
                    ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.shadowBlur = 0; // Reset shadow glow

                // Collision Check
                let dist = Math.hypot(e.x - playerX, e.y - playerY);
                if (dist < playerSize + e.size) {
                    if (e.type === 'repo') {
                        score += 2;
                        scoreVal.innerText = `${score}/50`;
                        spawnParticle(e.x, e.y, '#39ff14');
                        entities.splice(i, 1);

                        if (score >= 50) {
                            triggerWin();
                            return;
                        }
                    } else {
                        spawnParticle(e.x, e.y, '#ff3131');
                        triggerGameOver();
                        return;
                    }
                    continue;
                }

                // Cleanup missed items
                if (e.y > canvas.height + 20) {
                    entities.splice(i, 1);
                }
            }

            // Process and Draw Explosion Particles
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.03;
                if(p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }

            // Draw Rahul (The Character Avatar)
            ctx.fillStyle = '#00f0ff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00f0ff';
            
            // Modern clean triangle pointer design
            ctx.beginPath();
            ctx.moveTo(playerX, playerY - playerSize);
            ctx.lineTo(playerX + playerSize, playerY + playerSize);
            ctx.lineTo(playerX - playerSize, playerY + playerSize);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;

            // Character ID Label
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.font = '9px monospace';
            ctx.textAlign = 'center';
            ctx.fillText("RAHUL.EXE", playerX, playerY + playerSize + 15);

            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
